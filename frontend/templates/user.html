<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='stylesUser.css') }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<title>PetTracker</title>
</head>

<body>

<header class="topbar">
    <div class="user-profile">
        <div class="avatar">👤</div>
        <div class="profile-info">
            <span class="name">{{ nombre }}</span>
            <span class="verified">Usuario</span>
        </div>
        <form action="{{ url_for('logout') }}" method="get" style="display:inline;">
            <button class="btn-logout" type="submit">Cerrar sesión</button>
        </form>
    </div>
</header>

<main class="container">

    <!-- COLUMNA IZQUIERDA -->
    <aside class="sidebar">

        <!-- PERFIL USUARIO -->
        <section class="card">
            <div class="card-header">
                <h2>Buenos días, {{ nombre }}</h2>
                <span class="badge">Usuario</span>
            </div>
            <p>Panel de reportes de mascotas perdidas</p>
        </section>

        <!-- SUBIR IMAGEN -->
        <section class="card">
            <div class="card-header">
                <h2>Subir mascota perdida</h2>
            </div>
            <form id="upload-form">
            <div id="upload-box" class="upload-box">
                <input type="file" id="pet-photo" name="imagen" hidden>
                <p>Arrastra o haz clic para seleccionar</p>
            </div>
            <button id="analyze-btn" disabled>Analizar con IA y registrar</button>
            </form>
            <div id="message"></div>
        </section>

    </aside>

    <!-- COLUMNA DERECHA -->
    <main class="main">

        <!-- MAPA -->
        <section class="card">
            <div class="card-header">
                <h2>Mapa de mascotas</h2>
            </div>
            <div id="map" class="map"></div>

            <div class="distance-filter">
                <button data-km="5">5 km</button>
                <button data-km="10">10 km</button>
                <button data-km="20">20 km</button>
                <button data-km="50" class="active">50 km</button>
            </div>

            <div class="legend">
                <div><span class="dot green"></span> Protectora</div>
                <div><span class="dot blue"></span> Tu mascota</div>
            </div>
        </section>

        <!-- CONSEJOS -->
        <section class="card">
            <h2>Consejos</h2>
            <ul>
                <li>Foto clara</li>
                <li>Sin filtros</li>
                <li>Información exacta</li>
            </ul>
        </section>

    </main>
</main>

<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
